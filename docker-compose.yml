services:
  # ── Database Service (Postgres) ────────────────────────
  db:
    image: postgres:17-alpine
    container_name: fashop_db
    environment:
      POSTGRES_USER: ${DB_USER:-fashop_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fashop_secure_password}
      POSTGRES_DB: ${DB_NAME:-fashop_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fashop_network

  # ── Backend Service (FastAPI) ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fashop_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-FastAPI Shop}
      - DEBUG=True
      - CORS_ORIGINS=["http://localhost:5173","http://127.0.0.1:5173"]
      - DATABASE_URL=postgresql://${DB_USER:-fashop_admin}:${DB_PASSWORD:-fashop_secure_password}@db:5432/${DB_NAME:-fashop_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashop_network

networks:
  fashop_network:
    driver: bridge

volumes:
  pgdata: